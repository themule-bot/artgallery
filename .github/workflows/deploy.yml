name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config

      - name: Check index.html exists
        run: |
          if [ ! -f html/index.html ]; then
            echo "ERROR: index.html saknas!"
            exit 1
          fi
          echo "index.html finns ✅"

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t artgalleri:${{ github.sha }} .
          echo "Image byggd: artgalleri:${{ github.sha }}"

      - name: Image info
        run: |
          docker images artgalleri
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"