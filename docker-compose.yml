services:
    webbserver:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./html:/usr/share/nginx/html:ro
        restart: always

    portainer:
        image: portainer/portainer-ce
        ports:
            - "9000:9000"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - portainer-data:/data
        restart: always

volumes:
    portainer-data: